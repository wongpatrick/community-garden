app = 'backend-purple-darkness-9987'
primary_region = 'iad'

[build]
  [build.args]
    GO_VERSION = '1.25.6'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
